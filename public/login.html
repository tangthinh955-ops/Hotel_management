<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Khách Sạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer components {
            .navbar { @apply bg-gray-800 mb-6 shadow-md; }
            .nav-container { @apply container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center; }
            .nav-brand { @apply text-white text-xl font-bold mb-4 md:mb-0 hover:text-gray-300; }
            .nav-link { @apply text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium; }
            .nav-link-active { @apply bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium; }
            .card { @apply bg-white p-5 rounded-lg shadow-sm border border-gray-200; }
            .stat-card { @apply bg-white p-6 rounded-lg shadow-sm border border-gray-200; }
            .btn-primary { @apply w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors; }
            .btn-success { @apply w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition-colors; }
            .btn-warning { @apply bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-8 rounded transition-colors; }
            .btn-secondary { @apply bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-md text-sm font-medium shadow-sm transition-colors; }
            .btn-danger { @apply bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded text-sm transition-colors; }
            .btn-danger-outline { @apply border border-red-500 text-red-500 hover:bg-red-500 hover:text-white font-bold py-1 px-3 rounded text-sm transition-colors; }
            .form-input { @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white; }
            .form-label { @apply block text-sm font-medium text-gray-700 mb-1; }
            .table-container { @apply overflow-x-auto bg-white rounded-lg shadow-sm border border-gray-200; }
            .table-main { @apply min-w-full text-left; }
            .table-head { @apply bg-gray-800 text-white; }
            .th-cell { @apply py-3 px-4 font-semibold text-sm; }
            .td-cell { @apply py-3 px-4; }
            .tr-hover { @apply hover:bg-gray-50 transition-colors; }
            .badge-success { @apply px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800; }
            .badge-danger { @apply px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800; }
            .history-card { @apply mb-3 p-4 border border-gray-200 rounded-md bg-white shadow-sm hover:shadow transition-shadow; }
        }
    </style>
</head>
<body class="bg-gray-100" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-radius: 1rem; padding: 2rem;">
        <h3 class="text-center mb-6 text-2xl font-extrabold text-blue-600">🏨 HOTEL ADMIN</h3>

        <!-- Thẻ hiển thị lỗi -->
        <div id="error-message" style="display: none; background-color: #fee2e2; border: 1px solid #f87171; color: #b91c1c; padding: 0.75rem 1rem; border-radius: 0.25rem; margin-bottom: 1rem; text-align: center; font-weight: 500;">
            Sai tài khoản hoặc mật khẩu
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label for="email" class="block text-gray-600 font-semibold mb-2">Email đăng nhập</label>
                <input type="text" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="admin@gmail.com" required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-600 font-semibold mb-2">Mật khẩu</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">ĐĂNG NHẬP</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="text-gray-600 text-sm">Chưa có tài khoản? <a href="register.html" class="text-blue-600 font-semibold hover:underline">Đăng ký ngay</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
