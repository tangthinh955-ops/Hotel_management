<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quản Lý Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏨 HOTEL ADMIN</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Tổng quan</a>
                <a class="nav-link" href="rooms.html">Phòng</a>
                <a class="nav-link active" href="customers.html">Khách hàng</a>
                <a class="nav-link" href="bookings.html">Đặt phòng</a>
            </div>
        </div>
    </nav>
<div class="container">
    <button onclick="history.back()" class="btn btn-outline-secondary mb-3">&larr; Quay lại</button>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm mb-4">
                <h5 class="mb-3">Thêm Khách Hàng</h5>
                <form onsubmit="addCustomer(event)">
                    <input type="text" id="name" class="form-control mb-3" placeholder="Tên khách hàng" required>
                    <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                    <input type="text" id="phone" class="form-control mb-3" placeholder="Số điện thoại" required>
                    <button class="btn btn-success w-100">Đăng Ký Khách</button>
                </form>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Tên Khách Hàng</th>
                            <th>Email</th>
                            <th>Số Điện Thoại</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="customer-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
