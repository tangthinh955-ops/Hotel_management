<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quản Lý Khách Hàng</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-100 text-gray-800">
    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-brand" href="index.html">🏨 HOTEL ADMIN</a>
            <div class="flex space-x-2 md:space-x-4">
                <a class="nav-link" href="index.html">Tổng quan</a>
                <a class="nav-link" href="rooms.html">Phòng</a>
                <a class="nav-link-active" href="customers.html">Khách hàng</a>
                <a class="nav-link" href="bookings.html">Đặt phòng</a>
            </div>
        </div>
    </nav>
<div class="container mx-auto px-4">
    <button onclick="history.back()" class="btn-secondary mb-4">&larr; Quay lại</button>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1">
            <div class="card mb-6 lg:mb-0">
                <h5 class="text-lg font-bold mb-4 text-gray-700">Thêm Khách Hàng</h5>
                <form onsubmit="addCustomer(event)">
                    <input type="text" id="name" class="form-input mb-3" placeholder="Tên khách hàng" pattern="[a-zA-ZÀ-ỹ\s]+" title="Chỉ cho phép chữ cái và dấu cách, không chứa emoji/kí tự lạ" required>
                    <input type="email" id="email" class="form-input mb-3" placeholder="Email (@gmail.com)" pattern="[\w\.-]+@gmail\.com" title="Vui lòng nhập đúng định dạng đuôi @gmail.com" required>
                    <input type="text" id="phone" class="form-input mb-4" placeholder="Số điện thoại" pattern="\d+" title="Số điện thoại chỉ được chứa các chữ số" required>
                    <button class="btn-success">Đăng Ký Khách</button>
                </form>
            </div>
        </div>
        
        <div class="lg:col-span-2">
            <div class="table-container">
                <table class="table-main">
                    <thead class="table-head">
                        <tr>
                            <th class="th-cell">Tên Khách Hàng</th>
                            <th class="th-cell">Email</th>
                            <th class="th-cell">Số Điện Thoại</th>
                            <th class="th-cell">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="customer-table-body" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
