<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quản Lý Đặt Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏨 HOTEL ADMIN</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Tổng quan</a>
                <a class="nav-link" href="rooms.html">Phòng</a>
                <a class="nav-link" href="customers.html">Khách hàng</a>
                <a class="nav-link active" href="bookings.html">Đặt phòng</a>
            </div>
        </div>
    </nav>
<div class="container">
    <button onclick="history.back()" class="btn btn-outline-secondary mb-3">&larr; Quay lại</button>
    
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Tạo Đơn Đặt Phòng Mới</h5>
        <form onsubmit="createBooking(event)" class="row g-3">
            <div class="col-md-3"><label>Chọn Khách</label><select id="customerId" class="form-select"></select></div>
            <div class="col-md-3"><label>Chọn Phòng Trống</label><select id="roomId" class="form-select"></select></div>
            <div class="col-md-3"><label>Ngày Đến</label><input type="date" id="checkInDate" class="form-control"></div>
            <div class="col-md-3"><label>Ngày Đi</label><input type="date" id="checkOutDate" class="form-control"></div>
            <div class="col-12 text-end"><button class="btn btn-warning px-5">Xác Nhận Đặt Phòng</button></div>
        </form>
    </div>
    <table class="table table-hover bg-white shadow-sm">
        <thead class="table-dark"><tr><th>Phòng</th><th>Khách Hàng</th><th>Ngày Đến</th><th>Ngày Đi</th><th>Hành động</th></tr></thead>
        <tbody id="booking-table-body"></tbody>
    </table>
</div>
<script src="main.js"></script>
</body>
</html>
