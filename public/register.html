<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Khách Sạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200" style="width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-radius: 1rem; padding: 2rem;">
        <h3 class="text-center mb-6 text-2xl font-extrabold text-green-600">🏨 TẠO TÀI KHOẢN</h3>

        <!-- Thẻ hiển thị thông báo -->
        <div id="message-box" style="display: none; padding: 0.75rem 1rem; border-radius: 0.25rem; margin-bottom: 1rem; text-align: center; font-weight: 500;">
        </div>

        <form id="registerForm">
            <div class="mb-4">
                <label for="email" class="block text-gray-600 font-semibold mb-2">Email đăng nhập</label>
                <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" placeholder="admin@gmail.com" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-gray-600 font-semibold mb-2">Mật khẩu</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" placeholder="••••••" required>
            </div>
            <div class="mb-6">
                <label for="confirm-password" class="block text-gray-600 font-semibold mb-2">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" placeholder="••••••" required>
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200">ĐĂNG KÝ</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="text-gray-600 text-sm">Đã có tài khoản? <a href="login.html" class="text-green-600 font-semibold hover:underline">Đăng nhập</a></p>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
